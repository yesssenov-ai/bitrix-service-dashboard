<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProLabSupport — Карта оборудования</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --surface:#faf9f8;--card:#fff;--stroke:#e1dfdd;--stroke-2:#d2d0ce;
  --text:#201f1e;--text-2:#605e5c;--text-3:#8a8886;--text-4:#a19f9d;
  --brand:#0f6cbd;--brand-tint:#eff6fc;
  --accent:#C53B2F;--accent-tint:#fdf1ef;
  --success:#0e7c3f;--success-tint:#dff6dd;
  --warn:#bc4b09;--warn-tint:#fff4e5;
  --danger:#c4314b;--danger-tint:#fde7eb;
  --shadow-1:0 1px 3px rgba(0,0,0,.07);
  --shadow-2:0 4px 16px rgba(0,0,0,.08);
  --shadow-3:0 16px 48px rgba(0,0,0,.12);
  --radius:10px;--font:'Inter',system-ui,sans-serif;
}
html,body{height:100%;font-family:var(--font);background:var(--surface);color:var(--text);-webkit-font-smoothing:antialiased;}

/* ── HEADER ── */
.header{background:rgba(255,255,255,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--stroke);height:56px;display:flex;align-items:center;padding:0 20px;position:fixed;top:0;left:0;right:0;z-index:1000;box-shadow:var(--shadow-1);}
.logo{display:flex;align-items:center;gap:9px;font-weight:700;font-size:14px;flex-shrink:0;}
.logo-mark{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),#9c2f25);border-radius:7px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 5px rgba(197,59,47,.3);}
.logo-mark svg{width:14px;height:14px;}
.hdiv{width:1px;height:20px;background:var(--stroke-2);margin:0 14px;}
.h-nav a{padding:6px 12px;border-radius:7px;font-size:13px;font-weight:500;color:var(--text-2);text-decoration:none;transition:all .15s;}
.h-nav a:hover{background:rgba(0,0,0,.04);}
.h-nav a.active{background:var(--brand-tint);color:var(--brand);}
.h-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.user-chip{font-size:12px;color:var(--text-2);background:var(--surface);border:1px solid var(--stroke);border-radius:20px;padding:4px 11px 4px 7px;display:flex;align-items:center;gap:5px;}
.user-dot{width:6px;height:6px;border-radius:50%;background:var(--success);box-shadow:0 0 0 2px var(--success-tint);}

/* ── LAYOUT ── */
.app{display:flex;height:100vh;padding-top:56px;}

/* ── SIDEBAR ── */
.sidebar{width:380px;flex-shrink:0;background:var(--card);border-right:1px solid var(--stroke);display:flex;flex-direction:column;overflow:hidden;z-index:100;}

.sidebar-head{padding:16px 16px 12px;border-bottom:1px solid var(--stroke);}
.sidebar-title{font-size:15px;font-weight:700;margin-bottom:10px;letter-spacing:-.2px;}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px;}
.stat-chip{background:var(--surface);border:1px solid var(--stroke);border-radius:8px;padding:8px;text-align:center;}
.stat-num{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1;}
.stat-num.blue{color:var(--brand);}
.stat-num.green{color:var(--success);}
.stat-num.red{color:var(--danger);}
.stat-num.orange{color:var(--warn);}
.stat-label{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text-3);margin-top:2px;}

.filter-chips{display:flex;flex-wrap:wrap;gap:5px;}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;border:1.5px solid var(--stroke);background:var(--card);font-size:11.5px;font-weight:600;color:var(--text-2);cursor:pointer;transition:all .15s;white-space:nowrap;}
.chip:hover{border-color:var(--stroke-2);}
.chip.active{border-color:var(--chip-c,var(--brand));background:var(--chip-bg,var(--brand-tint));color:var(--chip-c,var(--brand));}
.chip-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

/* Search */
.search-box{position:relative;padding:10px 16px;border-bottom:1px solid var(--stroke);}
.search-box input{width:100%;background:var(--surface);border:1px solid var(--stroke);border-radius:8px;padding:8px 12px 8px 34px;font-size:13px;color:var(--text);font-family:var(--font);outline:none;}
.search-box input:focus{border-color:var(--brand);background:#fff;}
.search-box svg{position:absolute;left:27px;top:50%;transform:translateY(-50%);color:var(--text-3);}

/* Equipment list */
.eq-list{flex:1;overflow-y:auto;padding:8px 0;}
.eq-list::-webkit-scrollbar{width:6px;}
.eq-list::-webkit-scrollbar-thumb{background:var(--stroke-2);border-radius:3px;}

.eq-item{padding:12px 16px;cursor:pointer;border-bottom:1px solid rgba(225,223,221,.5);transition:background .1s;position:relative;}
.eq-item:hover{background:var(--surface);}
.eq-item.active{background:var(--brand-tint);}
.eq-item.has-problems::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--danger);}
.eq-item-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px;}
.eq-item-icon{width:32px;height:32px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;}
.eq-item-icon.prolab{background:var(--brand-tint);color:var(--brand);}
.eq-item-icon.third{background:var(--surface);color:var(--text-3);border:1px solid var(--stroke);}
.eq-item-name{font-size:12.5px;font-weight:600;color:var(--text);line-height:1.35;flex:1;}
.eq-item-meta{font-size:11px;color:var(--text-3);display:flex;flex-wrap:wrap;gap:4px;}
.eq-meta-tag{background:var(--surface);border:1px solid var(--stroke);border-radius:5px;padding:1px 6px;font-size:10.5px;font-weight:500;}
.eq-meta-tag.warn{background:var(--warn-tint);border-color:rgba(188,75,9,.2);color:var(--warn);}
.eq-meta-tag.danger{background:var(--danger-tint);border-color:rgba(196,49,75,.2);color:var(--danger);}
.eq-meta-tag.success{background:var(--success-tint);border-color:rgba(14,124,63,.2);color:var(--success);}
.eq-meta-tag.gray{color:var(--text-3);}

.no-coords{opacity:.5;cursor:default;}
.empty-list{text-align:center;padding:40px 20px;color:var(--text-3);font-size:13px;}

/* ── MAP ── */
.map-wrap{flex:1;position:relative;}
#map{width:100%;height:100%;}
.map-loading{position:absolute;inset:0;background:rgba(250,249,248,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:500;font-size:13px;color:var(--text-2);}
.spinner{width:36px;height:36px;border:3px solid var(--stroke);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── DETAIL PANEL ── */
.detail-panel{
  position:absolute;bottom:20px;right:20px;width:340px;max-height:70vh;overflow-y:auto;
  background:var(--card);border:1px solid var(--stroke);border-radius:var(--radius);
  box-shadow:var(--shadow-3);z-index:500;display:none;animation:slideUp .2s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.detail-panel.show{display:block;}
.dp-head{padding:14px 16px 12px;border-bottom:1px solid var(--stroke);display:flex;align-items:flex-start;justify-content:space-between;gap:8px;position:sticky;top:0;background:var(--card);}
.dp-title{font-size:13.5px;font-weight:700;color:var(--text);line-height:1.3;flex:1;}
.dp-close{width:26px;height:26px;border-radius:6px;border:1px solid var(--stroke);background:none;cursor:pointer;color:var(--text-3);font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.dp-close:hover{background:var(--surface);}
.dp-body{padding:14px 16px;}
.dp-row{display:flex;margin-bottom:9px;gap:8px;}
.dp-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text-3);width:110px;flex-shrink:0;padding-top:1px;}
.dp-val{font-size:12.5px;color:var(--text);flex:1;line-height:1.4;}
.dp-section{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--brand);margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--stroke);}
.dp-ticket{background:var(--surface);border:1px solid var(--stroke);border-radius:7px;padding:8px 10px;margin-bottom:6px;}
.dp-ticket.overdue{border-color:rgba(196,49,75,.3);background:var(--danger-tint);}
.dp-ticket-title{font-size:12px;font-weight:600;margin-bottom:3px;}
.dp-ticket-stage{font-size:11px;color:var(--text-3);}
.dp-btn{display:inline-flex;align-items:center;gap:5px;background:var(--brand);color:#fff;padding:7px 14px;border-radius:7px;font-size:12.5px;font-weight:600;text-decoration:none;margin-top:12px;}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-mark"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg></div>
    ProLabSupport
  </div>
  <div class="hdiv"></div>
  <nav class="h-nav" style="display:flex;gap:2px;">
    <a href="/">← Дашборд</a>
    <a href="/relations.html">Связи сделок</a>
    <a href="/equipment-map.html" class="active">🗺 Карта оборудования</a>
  </nav>
  <div class="h-right">
    <span class="user-chip"><span class="user-dot"></span><span id="currentUser">—</span></span>
  </div>
</header>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-title">Парк оборудования</div>
      <div class="stats-row" id="statsRow">
        <div class="stat-chip"><div class="stat-num blue" id="statTotal">—</div><div class="stat-label">Всего</div></div>
        <div class="stat-chip"><div class="stat-num green" id="statMapped">—</div><div class="stat-label">На карте</div></div>
        <div class="stat-chip"><div class="stat-num orange" id="statWarranty">—</div><div class="stat-label">Гарантия</div></div>
        <div class="stat-chip"><div class="stat-num red" id="statProblems">—</div><div class="stat-label">Проблемы</div></div>
      </div>
      <div class="filter-chips" id="filterChips">
        <div class="chip active" data-filter="all" onclick="setFilter('all',this)"><span class="chip-dot"></span>Все</div>
        <div class="chip" data-filter="prolab" style="--chip-c:#0f6cbd;--chip-bg:#eff6fc" onclick="setFilter('prolab',this)"><span class="chip-dot"></span>ProLabSupport</div>
        <div class="chip" data-filter="third" style="--chip-c:#8764b8;--chip-bg:#f3f0fa" onclick="setFilter('third',this)"><span class="chip-dot"></span>Сторонние</div>
        <div class="chip" data-filter="warranty" style="--chip-c:#0e7c3f;--chip-bg:#dff6dd" onclick="setFilter('warranty',this)"><span class="chip-dot"></span>На гарантии</div>
        <div class="chip" data-filter="problems" style="--chip-c:#c4314b;--chip-bg:#fde7eb" onclick="setFilter('problems',this)"><span class="chip-dot"></span>⚠ Проблемы</div>
      </div>
    </div>

    <div class="search-box">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Поиск по названию, адресу, серийному номеру…" oninput="debSearch()">
    </div>

    <div class="eq-list" id="eqList">
      <div class="empty-list">Загрузка данных…</div>
    </div>
  </aside>

  <!-- MAP -->
  <div class="map-wrap">
    <div class="map-loading" id="mapLoading">
      <div class="spinner"></div>
      <span id="loadingMsg">Загружаем оборудование из Б24…</span>
    </div>
    <div id="map"></div>

    <!-- Detail panel -->
    <div class="detail-panel" id="detailPanel">
      <div class="dp-head">
        <div class="dp-title" id="dpTitle">—</div>
        <button class="dp-close" onclick="closeDetail()">✕</button>
      </div>
      <div class="dp-body" id="dpBody"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
let allItems = [];
let filteredItems = [];
let currentFilter = 'all';
let debT = null;
let map, clusterGroup;
let markers = {}; // itemId -> marker
let selectedId = null;

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const r = await fetch('/auth/me');
    if (!r.ok) { window.location.href = '/login.html'; return; }
    const d = await r.json();
    document.getElementById('currentUser').textContent = d.user.displayName;
  } catch(e) { window.location.href = '/login.html'; return; }

  initMap();
  loadData();
}

function initMap() {
  map = L.map('map', { center: [48.0196, 66.9237], zoom: 5 });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19,
  }).addTo(map);

  clusterGroup = L.markerClusterGroup({
    showCoverageOnHover: false,
    maxClusterRadius: 60,
    iconCreateFunction: createClusterIcon,
  });
  map.addLayer(clusterGroup);
}

function createClusterIcon(cluster) {
  const markers = cluster.getAllChildMarkers();
  const hasProblems = markers.some(m => m.options.hasProblems);
  const count = cluster.getChildCount();
  const color = hasProblems ? '#c4314b' : '#0f6cbd';
  return L.divIcon({
    html: `<div style="background:${color};color:#fff;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.25);border:2px solid #fff;">${count}</div>`,
    className: '',
    iconSize: [36, 36],
    iconAnchor: [18, 18],
  });
}

function makeMarkerIcon(item) {
  const color = item.hasProblems ? '#c4314b' : item.seller === 'ProLabSupport' ? '#0f6cbd' : '#8764b8';
  return L.divIcon({
    html: `<div style="background:${color};border:2px solid #fff;border-radius:50%;width:14px;height:14px;box-shadow:0 1px 4px rgba(0,0,0,.3);"></div>`,
    className: '',
    iconSize: [14, 14],
    iconAnchor: [7, 7],
  });
}

async function loadData() {
  try {
    document.getElementById('loadingMsg').textContent = 'Загружаем оборудование из Б24…';
    const r = await fetch('/equipment/map-data');
    const d = await r.json();
    if (!d.ok) { document.getElementById('loadingMsg').textContent = 'Ошибка: ' + d.error; return; }

    allItems = d.items;
    updateStats(d.stats);
    applyFilter();
    document.getElementById('mapLoading').style.display = 'none';

    const unmapped = allItems.filter(e => !e.lat || !e.lng).length;
    if (unmapped > 0) console.log(`ℹ️ ${unmapped} приборов без координат (адрес не геокодирован)`);
  } catch(e) {
    document.getElementById('loadingMsg').textContent = 'Ошибка загрузки: ' + e.message;
  }
}

function updateStats(stats) {
  document.getElementById('statTotal').textContent = stats.total;
  document.getElementById('statMapped').textContent = stats.mapped;
  document.getElementById('statWarranty').textContent = stats.warranty;
  document.getElementById('statProblems').textContent = stats.problems;
}

// ── Filter & render ───────────────────────────────────────────────────────────
function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  applyFilter();
}

function debSearch() { clearTimeout(debT); debT = setTimeout(applyFilter, 300); }

function applyFilter() {
  const search = document.getElementById('searchInput').value.toLowerCase().trim();

  filteredItems = allItems.filter(item => {
    // Status filter
    if (currentFilter === 'prolab' && item.seller !== 'ProLabSupport') return false;
    if (currentFilter === 'third' && item.seller !== 'Сторонний продавец') return false;
    if (currentFilter === 'warranty') {
      if (item.hasWarranty !== 'Есть') return false;
      if (item.warrantyEnd && new Date(item.warrantyEnd) < new Date()) return false;
    }
    if (currentFilter === 'problems' && !item.hasProblems) return false;

    // Search
    if (search) {
      const hay = [item.title, item.address, ...(item.serialNums||[]), ...(item.catalogNums||[]), item.manufacturer].join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  renderList();
  renderMarkers();
}

function renderList() {
  const wrap = document.getElementById('eqList');
  if (!filteredItems.length) {
    wrap.innerHTML = '<div class="empty-list">Ничего не найдено</div>';
    return;
  }

  wrap.innerHTML = filteredItems.map(item => {
    const hasCoords = item.lat && item.lng;
    const warrantyOk = item.hasWarranty === 'Есть' && item.warrantyEnd && new Date(item.warrantyEnd) > new Date();
    const warrantyExpiring = warrantyOk && (new Date(item.warrantyEnd) - new Date()) < 90*24*60*60*1000;
    const sellerIcon = item.seller === 'ProLabSupport' ? '🔵' : '⚪';

    let tags = '';
    if (item.hasProblems) tags += `<span class="eq-meta-tag danger">⚠ Активные заявки</span>`;
    if (warrantyOk) tags += `<span class="eq-meta-tag ${warrantyExpiring?'warn':'success'}">Гарантия до ${fmtDate(item.warrantyEnd)}</span>`;
    if (item.manufacturer) tags += `<span class="eq-meta-tag gray">${esc(item.manufacturer)}</span>`;
    if (!hasCoords) tags += `<span class="eq-meta-tag gray">Без адреса</span>`;

    return `<div class="eq-item ${item.hasProblems?'has-problems':''} ${!hasCoords?'no-coords':''} ${selectedId===item.id?'active':''}" id="eq-${item.id}" onclick="selectItem(${item.id})">
      <div class="eq-item-header">
        <div class="eq-item-icon ${item.seller==='ProLabSupport'?'prolab':'third'}">${sellerIcon}</div>
        <div class="eq-item-name">${esc(item.title)}</div>
      </div>
      <div class="eq-item-meta">
        ${item.companyName ? `<span style="font-weight:600;color:var(--text-2)">${esc(item.companyName)}</span>` : ''}
        ${item.address ? `<span>${esc(item.address.slice(0,45))}</span>` : ''}
        ${tags}
      </div>
    </div>`;
  }).join('');
}

function renderMarkers() {
  clusterGroup.clearLayers();
  markers = {};

  for (const item of filteredItems) {
    if (!item.lat || !item.lng) continue;
    const m = L.marker([item.lat, item.lng], {
      icon: makeMarkerIcon(item),
      hasProblems: item.hasProblems,
    });
    m.on('click', () => selectItem(item.id));
    m.bindTooltip(`<strong>${esc(item.title)}</strong><br>${esc(item.address||'')}`, { direction: 'top', offset: [0,-6] });
    clusterGroup.addLayer(m);
    markers[item.id] = m;
  }
}

function selectItem(id) {
  selectedId = id;
  const item = allItems.find(e => e.id === id);
  if (!item) return;

  // Highlight in list
  document.querySelectorAll('.eq-item').forEach(el => el.classList.remove('active'));
  document.getElementById('eq-' + id)?.classList.add('active');
  document.getElementById('eq-' + id)?.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

  // Fly to on map
  if (item.lat && item.lng) {
    map.flyTo([item.lat, item.lng], 15, { duration: 0.8 });
    markers[id]?.openTooltip();
  }

  // Show detail panel
  showDetail(item);
}

function showDetail(item) {
  document.getElementById('dpTitle').textContent = item.title;

  const warrantyOk = item.hasWarranty === 'Есть' && item.warrantyEnd && new Date(item.warrantyEnd) > new Date();
  const warrantyColor = warrantyOk ? '#0e7c3f' : '#c4314b';
  const warrantyText = item.hasWarranty === 'Есть'
    ? `Есть (до ${fmtDate(item.warrantyEnd)})`
    : (item.hasWarranty === 'Нет' ? 'Нет' : '—');

  let ticketsHtml = '';
  if (item.activeTickets && item.activeTickets.length) {
    ticketsHtml = `<div class="dp-section">Активные заявки (${item.activeTickets.length})</div>`;
    for (const t of item.activeTickets) {
      ticketsHtml += `<div class="dp-ticket ${t.isOverdue?'overdue':''}">
        <div class="dp-ticket-title">#${t.id} ${esc(t.title||'').slice(0,60)}</div>
        <div class="dp-ticket-stage">${esc(t.stageId)} ${t.isOverdue?'⚠ Просрочена':''}</div>
        <a href="${t.url}" target="_blank" style="font-size:11px;color:var(--brand)">Открыть →</a>
      </div>`;
    }
  }

  const stageNames = {
    'DT1058_11:NEW':'Необработанные','DT1058_11:PREPARATION':'Назначение инженера',
    'DT1058_11:CLIENT':'Заявка в работе','DT1058_11:1':'Срочная в работе',
    'DT1058_11:2':'Заявка на обучение','DT1058_11:3':'Заявка исполнена',
    'DT1058_11:4':'Претензия',
  };

  document.getElementById('dpBody').innerHTML = `
    ${item.companyName ? `<div class="dp-row"><div class="dp-lbl">Клиент</div><div class="dp-val" style="font-weight:600">${esc(item.companyName)}</div></div>` : ''}
    <div class="dp-row"><div class="dp-lbl">Адрес</div><div class="dp-val">${esc(item.address||'—')}</div></div>
    <div class="dp-row"><div class="dp-lbl">Производитель</div><div class="dp-val">${esc(item.manufacturer||'—')}</div></div>
    <div class="dp-row"><div class="dp-lbl">Вид</div><div class="dp-val">${esc(item.deviceType||'—')}</div></div>
    ${item.catalogNums?.length ? `<div class="dp-row"><div class="dp-lbl">Каталог №</div><div class="dp-val">${item.catalogNums.map(esc).join(', ')}</div></div>` : ''}
    ${item.serialNums?.length ? `<div class="dp-row"><div class="dp-lbl">Серийный №</div><div class="dp-val">${item.serialNums.map(esc).join(', ')}</div></div>` : ''}
    <div class="dp-row"><div class="dp-lbl">Гарантия</div><div class="dp-val" style="color:${warrantyColor};font-weight:600">${warrantyText}</div></div>
    <div class="dp-row"><div class="dp-lbl">Продавец</div><div class="dp-val">${esc(item.seller||'—')}</div></div>
    ${item.serviceStart ? `<div class="dp-row"><div class="dp-lbl">Обслуживание</div><div class="dp-val">${fmtDate(item.serviceStart)} — ${item.serviceEnd?fmtDate(item.serviceEnd):'∞'}</div></div>` : ''}
    ${item.activeTickets?.length ? `
      <div class="dp-section">Активные заявки на сервис (${item.activeTickets.length})</div>
      ${item.activeTickets.map(t => `<div class="dp-ticket ${t.isOverdue?'overdue':''}">
        <div class="dp-ticket-title">#${t.id} ${esc((t.title||'').replace(/^[-\s–—]+/,'').slice(0,55))}</div>
        <div class="dp-ticket-stage">${esc(stageNames[t.stageId]||t.stageId)}${t.isOverdue?' ⚠ Просрочена':''}</div>
        <a href="${t.url}" target="_blank" style="font-size:11px;color:var(--brand)">Открыть в Б24 →</a>
      </div>`).join('')}` : ''}
    <a href="${item.url}" target="_blank" class="dp-btn">Открыть оборудование в Б24 →</a>`;

  document.getElementById('detailPanel').classList.add('show');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('show');
  selectedId = null;
  document.querySelectorAll('.eq-item').forEach(el => el.classList.remove('active'));
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('ru', { day:'2-digit', month:'2-digit', year:'numeric' });
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

init();
</script>
</body>
</html>
