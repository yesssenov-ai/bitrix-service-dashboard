<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProLabSupport - Карта оборудования</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --surface:#faf9f8;--card:#fff;--stroke:#e1dfdd;--stroke-2:#d2d0ce;
  --text:#201f1e;--text-2:#605e5c;--text-3:#8a8886;--text-4:#a19f9d;
  --brand:#0f6cbd;--brand-tint:#eff6fc;--brand-2:#2899f5;
  --accent:#C53B2F;--accent-tint:#fdf1ef;
  --success:#0e7c3f;--success-tint:#dff6dd;
  --warn:#bc4b09;--warn-tint:#fff4e5;
  --danger:#c4314b;--danger-tint:#fde7eb;
  --purple:#7c3aed;--purple-tint:#f5f3ff;
  --shadow-1:0 1px 3px rgba(0,0,0,.07);
  --shadow-2:0 4px 16px rgba(0,0,0,.08);
  --shadow-3:0 16px 48px rgba(0,0,0,.13);
  --r:10px;--font:'Inter',system-ui,sans-serif;
}
html,body{height:100%;font-family:var(--font);background:var(--surface);color:var(--text);-webkit-font-smoothing:antialiased;}

/* HEADER */
.hdr{background:rgba(255,255,255,.92);backdrop-filter:blur(18px);border-bottom:1px solid var(--stroke);height:56px;display:flex;align-items:center;padding:0 20px;position:fixed;top:0;left:0;right:0;z-index:1000;box-shadow:var(--shadow-1);}
.logo{display:flex;align-items:center;gap:9px;font-weight:700;font-size:14px;flex-shrink:0;}
.logo-mark{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),#9c2f25);border-radius:7px;display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:14px;height:14px;}
.hdiv{width:1px;height:20px;background:var(--stroke-2);margin:0 14px;}
.hnav a{padding:6px 12px;border-radius:7px;font-size:13px;font-weight:500;color:var(--text-2);text-decoration:none;transition:all .15s;}
.hnav a:hover{background:rgba(0,0,0,.04);}
.hnav a.act{background:var(--brand-tint);color:var(--brand);}
.hright{margin-left:auto;display:flex;align-items:center;gap:8px;}
.uchip{font-size:12px;color:var(--text-2);background:var(--surface);border:1px solid var(--stroke);border-radius:20px;padding:4px 11px 4px 7px;display:flex;align-items:center;gap:5px;}
.udot{width:6px;height:6px;border-radius:50%;background:var(--success);}

/* LAYOUT */
.app{display:flex;height:100vh;padding-top:56px;}

/* SIDEBAR */
.sb{width:360px;flex-shrink:0;background:var(--card);border-right:1px solid var(--stroke);display:flex;flex-direction:column;overflow:hidden;z-index:100;}
.sb-head{padding:14px 16px 10px;border-bottom:1px solid var(--stroke);flex-shrink:0;}
.sb-title{font-size:14px;font-weight:700;letter-spacing:-.2px;margin-bottom:10px;}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px;}
.stat{background:var(--surface);border:1px solid var(--stroke);border-radius:8px;padding:7px;text-align:center;}
.stat-n{font-size:17px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
.stat-l{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text-3);margin-top:2px;}
.blue{color:var(--brand);} .green{color:var(--success);} .red{color:var(--danger);} .orange{color:var(--warn);}

/* Tabs */
.tabs{display:flex;background:var(--surface);border:1px solid var(--stroke);border-radius:8px;padding:3px;gap:2px;}
.tab{flex:1;text-align:center;padding:6px;border-radius:6px;font-size:11.5px;font-weight:600;cursor:pointer;color:var(--text-3);transition:all .15s;border:none;background:none;font-family:var(--font);}
.tab:hover{color:var(--text-2);}
.tab.on{background:var(--card);color:var(--brand);box-shadow:var(--shadow-1);}

/* Filter panels */
.fp{padding:12px 16px;border-bottom:1px solid var(--stroke);flex-shrink:0;}
.fp-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);margin-bottom:6px;}

/* Manufacturer chips */
.mfr-chips{display:flex;flex-wrap:wrap;gap:4px;}
.chip-cnt{font-size:10px;opacity:.7;}

/* Device model selector */
.model-wrap{position:relative;}
.fsel{width:100%;background:var(--surface);border:1px solid var(--stroke);border-radius:8px;padding:8px 12px;font-size:12.5px;color:var(--text);font-family:var(--font);outline:none;appearance:none;cursor:pointer;}
.fsel:focus{border-color:var(--brand);}

/* Search inputs */
.sinput{position:relative;}
.sinput svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none;}
.sinput input{width:100%;background:var(--surface);border:1px solid var(--stroke);border-radius:8px;padding:8px 12px 8px 32px;font-size:12.5px;color:var(--text);font-family:var(--font);outline:none;}
.sinput input:focus{border-color:var(--brand);background:#fff;}
.sinput input::placeholder{color:var(--text-4);}
.autocomplete{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--stroke);border-radius:8px;box-shadow:var(--shadow-3);max-height:220px;overflow-y:auto;z-index:200;margin-top:4px;display:none;}
.autocomplete.show{display:block;}
.ac-item{padding:8px 12px;cursor:pointer;font-size:12.5px;display:flex;justify-content:space-between;}
.ac-item:hover{background:var(--brand-tint);}
.ac-cnt{font-size:11px;color:var(--text-3);}

/* Toggle row */
.toggle-row{display:flex;gap:6px;flex-wrap:wrap;}
.tgl{padding:5px 10px;border-radius:7px;border:1.5px solid var(--stroke);background:var(--card);font-size:11.5px;font-weight:600;color:var(--text-2);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:4px;}
.tgl:hover{border-color:var(--stroke-2);}
.tgl.on{border-color:var(--tgl-c,var(--brand));background:var(--tgl-bg,var(--brand-tint));color:var(--tgl-c,var(--brand));}

/* Equipment list */
.eq-list{flex:1;overflow-y:auto;padding:4px 0;}
.eq-list::-webkit-scrollbar{width:5px;}
.eq-list::-webkit-scrollbar-thumb{background:var(--stroke-2);border-radius:3px;}
.eq-item{padding:10px 16px;cursor:pointer;border-bottom:1px solid rgba(225,223,221,.5);transition:background .1s;position:relative;}
.eq-item:hover{background:var(--surface);}
.eq-item.on{background:var(--brand-tint);}
.eq-item.prob::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--danger);}
.eq-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:4px;}
.eq-icon{width:30px;height:30px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;}
.eq-icon.pl{background:var(--brand-tint);color:var(--brand);}
.eq-icon.th{background:var(--surface);color:var(--text-3);border:1px solid var(--stroke);}
.eq-name{font-size:12.5px;font-weight:600;color:var(--text);line-height:1.3;flex:1;}
.eq-meta{font-size:11px;color:var(--text-3);display:flex;flex-wrap:wrap;gap:3px;}
.tag{background:var(--surface);border:1px solid var(--stroke);border-radius:5px;padding:1px 6px;font-size:10.5px;font-weight:500;}
.tag.danger{background:var(--danger-tint);border-color:rgba(196,49,75,.2);color:var(--danger);}
.tag.success{background:var(--success-tint);border-color:rgba(14,124,63,.2);color:var(--success);}
.tag.warn{background:var(--warn-tint);border-color:rgba(188,75,9,.2);color:var(--warn);}
.eq-empty{text-align:center;padding:36px 20px;color:var(--text-3);font-size:13px;}

/* MAP */
.map-wrap{flex:1;position:relative;}
#map{width:100%;height:100%;}
.map-overlay{position:absolute;inset:0;background:rgba(250,249,248,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:500;font-size:13px;color:var(--text-2);}
.spinner{width:32px;height:32px;border:3px solid var(--stroke);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Service tickets layer toggle */
.map-controls{position:absolute;top:12px;right:12px;z-index:400;display:flex;flex-direction:column;gap:6px;}
.map-btn{background:var(--card);border:1px solid var(--stroke);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:var(--shadow-1);color:var(--text-2);font-family:var(--font);transition:all .15s;white-space:nowrap;}
.map-btn:hover{box-shadow:var(--shadow-2);}
.map-btn.on{background:var(--brand);color:#fff;border-color:var(--brand);}
.map-btn.refresh{color:var(--brand);}

/* Detail panel */
.dp{position:absolute;bottom:16px;right:16px;width:340px;max-height:72vh;overflow-y:auto;background:var(--card);border:1px solid var(--stroke);border-radius:var(--r);box-shadow:var(--shadow-3);z-index:400;display:none;}
.dp.show{display:block;animation:su .2s ease;}
@keyframes su{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.dp-head{padding:13px 16px 11px;border-bottom:1px solid var(--stroke);display:flex;align-items:flex-start;justify-content:space-between;gap:8px;position:sticky;top:0;background:var(--card);}
.dp-title{font-size:13px;font-weight:700;color:var(--text);line-height:1.3;flex:1;}
.dp-x{width:24px;height:24px;border-radius:6px;border:1px solid var(--stroke);background:none;cursor:pointer;color:var(--text-3);font-size:13px;}
.dp-x:hover{background:var(--surface);}
.dp-body{padding:14px 16px;}
.dp-row{display:flex;margin-bottom:8px;gap:8px;}
.dp-lbl{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text-3);width:105px;flex-shrink:0;padding-top:1px;}
.dp-val{font-size:12.5px;color:var(--text);flex:1;line-height:1.4;}
.dp-sec{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--brand);margin:12px 0 7px;padding-bottom:4px;border-bottom:1px solid var(--stroke);}
.dp-ticket{background:var(--surface);border:1px solid var(--stroke);border-radius:7px;padding:8px 10px;margin-bottom:5px;}
.dp-ticket.ov{border-color:rgba(196,49,75,.3);background:var(--danger-tint);}
.dp-ticket-t{font-size:12px;font-weight:600;margin-bottom:2px;}
.dp-ticket-s{font-size:11px;color:var(--text-3);}
.dp-btn{display:inline-flex;align-items:center;gap:5px;background:var(--brand);color:#fff;padding:8px 14px;border-radius:7px;font-size:12.5px;font-weight:600;text-decoration:none;margin-top:12px;}
</style>
</head>
<body>
<header class="hdr">
  <div class="logo">
    <div class="logo-mark"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg></div>
    ProLabSupport
  </div>
  <div class="hdiv"></div>
  <nav class="hnav" style="display:flex;gap:2px;">
    <a href="/">← Дашборд</a>
    <a href="/relations.html">Связи сделок</a>
    <a href="/equipment-map.html" class="act">🗺 Карта оборудования</a>
  </nav>
  <div class="hright">
    <span class="uchip"><span class="udot"></span><span id="uname">—</span></span>
  </div>
</header>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sb">
    <div class="sb-head">
      <div class="sb-title">Парк оборудования</div>
      <div class="stats">
        <div class="stat"><div class="stat-n blue" id="sTotal">—</div><div class="stat-l">Всего</div></div>
        <div class="stat"><div class="stat-n green" id="sMapped">—</div><div class="stat-l">На карте</div></div>
        <div class="stat"><div class="stat-n orange" id="sWarr">—</div><div class="stat-l">Гарантия</div></div>
        <div class="stat"><div class="stat-n red" id="sProb">—</div><div class="stat-l">Проблемы</div></div>
      </div>
      <div class="tabs">
        <button class="tab on" onclick="setMode('equipment',this)">⚙️ Оборудование</button>
        <button class="tab" onclick="setMode('city',this)">🏙 По городу</button>
        <button class="tab" onclick="setMode('company',this)">🏢 По клиенту</button>
      </div>
    </div>

    <!-- EQUIPMENT MODE -->
    <div id="modeEquipment">
      <!-- Manufacturer filter -->
      <div class="fp">
        <div class="fp-label">Производитель</div>
        <select class="fsel" id="mfrSel" onchange="setMfrFromSel()">
          <option value="">Все производители</option>
        </select>
      </div>
      <!-- Device model -->
      <div class="fp">
        <div class="fp-label">Модель прибора</div>
        <select class="fsel" id="modelSel" onchange="applyFilters()">
          <option value="">Все модели</option>
        </select>
      </div>
      <!-- Status -->
      <div class="fp">
        <div class="fp-label">Статус</div>
        <select class="fsel" id="statusSel" onchange="setStatFromSel()">
          <option value="">Все</option>
          <option value="prolab">🔵 ProLabSupport</option>
          <option value="third">⚪ Сторонние продавцы</option>
          <option value="warranty">✅ На гарантии</option>
          <option value="problems">⚠ Есть проблемы</option>
        </select>
      </div>
    </div>

    <!-- CITY MODE -->
    <div id="modeCity" style="display:none">
      <div class="fp">
        <div class="fp-label">Поиск по городу</div>
        <div class="sinput" style="position:relative">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="cityInput" placeholder="Введите город или регион…" oninput="onCityInput()" autocomplete="off">
          <div class="autocomplete" id="cityAC"></div>
        </div>
      </div>
    </div>

    <!-- COMPANY MODE -->
    <div id="modeCompany" style="display:none">
      <div class="fp">
        <div class="fp-label">Поиск по клиенту</div>
        <div class="sinput" style="position:relative">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="companyInput" placeholder="Название компании…" oninput="onCompanyInput()" autocomplete="off">
          <div class="autocomplete" id="companyAC"></div>
        </div>
      </div>
    </div>

    <!-- LIST -->
    <div class="eq-list" id="eqList"><div class="eq-empty">Загрузка…</div></div>
  </aside>

  <!-- MAP -->
  <div class="map-wrap">
    <div class="map-overlay" id="mapOverlay">
      <div class="spinner"></div>
      <span id="loadMsg">Загружаем оборудование из Б24…</span>
    </div>
    <div id="map"></div>

    <div class="map-controls">
      <button class="map-btn" id="btnTickets" onclick="toggleTicketsLayer()">
        🔔 Заявки на сервис
      </button>
      <button class="map-btn refresh" onclick="refreshData()">
        ↻ Обновить
      </button>
    </div>

    <div class="dp" id="dp">
      <div class="dp-head">
        <div class="dp-title" id="dpTitle">—</div>
        <button class="dp-x" onclick="closeDP()">✕</button>
      </div>
      <div class="dp-body" id="dpBody"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
// ── State ─────────────────────────────────────────────────────────────────────
let allItems = [], filteredItems = [];
let manufacturers = [], deviceNames = [], cities = [], companies = [];
let mode = 'equipment';
let curMfr = '', curModel = '', curStatus = '', curCity = '', curCompany = '';
let showTickets = false;
let selectedId = null;
let map, clusterGroup, ticketLayer;
let markers = {};
let debT = null;

const STAGE_NAMES = {
  'DT1058_11:UC_N8RQ0V':'Заявки клиентов','DT1058_11:NEW':'Необработанные',
  'DT1058_11:PREPARATION':'Назначение инженера','DT1058_11:CLIENT':'Заявка в работе',
  'DT1058_11:1':'Срочная в работе','DT1058_11:2':'Заявка на обучение',
  'DT1058_11:3':'Заявка исполнена',
};
const STAGE_COLORS = {
  'DT1058_11:UC_N8RQ0V':'#468ee5','DT1058_11:NEW':'#22B9FF',
  'DT1058_11:PREPARATION':'#88B9FF','DT1058_11:CLIENT':'#10e5fc',
  'DT1058_11:1':'#FF6B35','DT1058_11:2':'#9B59B6','DT1058_11:3':'#55D0E0',
};

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const r = await fetch('/auth/me');
    if (!r.ok) { window.location.href = '/login.html'; return; }
    const d = await r.json();
    document.getElementById('uname').textContent = d.user.displayName;
  } catch(e) { window.location.href = '/login.html'; return; }
  initMap();
  loadData();
}

function initMap() {
  map = L.map('map', { center: [48.5, 66.9], zoom: 5 });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap', maxZoom: 19,
  }).addTo(map);
  clusterGroup = L.markerClusterGroup({
    showCoverageOnHover: false,
    maxClusterRadius: 60,
    iconCreateFunction: createCluster,
  });
  map.addLayer(clusterGroup);
  ticketLayer = L.layerGroup();
}

function createCluster(cluster) {
  const ms = cluster.getAllChildMarkers();
  const hasProb = ms.some(m => m.options.hasProblems);
  const c = hasProb ? '#c4314b' : '#0f6cbd';
  return L.divIcon({
    html: `<div style="background:${c};color:#fff;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.25);border:2px solid #fff">${cluster.getChildCount()}</div>`,
    className:'',iconSize:[36,36],iconAnchor:[18,18],
  });
}

function makeIcon(item) {
  const c = item.hasProblems ? '#c4314b' : item.seller === 'ProLabSupport' ? '#0f6cbd' : '#8764b8';
  return L.divIcon({
    html: `<div style="background:${c};border:2px solid #fff;border-radius:50%;width:14px;height:14px;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>`,
    className:'',iconSize:[14,14],iconAnchor:[7,7],
  });
}

// ── Data loading ──────────────────────────────────────────────────────────────
async function loadData(force = false) {
  document.getElementById('mapOverlay').style.display = 'flex';
  document.getElementById('loadMsg').textContent = 'Запрашиваем данные из Б24…';

  try {
    const r = await fetch('/equipment/map-data' + (force ? '?refresh=1' : ''));
    const d = await r.json();

    if (!d.ok) {
      document.getElementById('loadMsg').textContent = 'Ошибка: ' + d.error; return;
    }

    if (d.loading) {
      // Data is being loaded in background - poll every 3 seconds
      document.getElementById('loadMsg').textContent = 'Загружаем данные из Б24… (это займёт ~2-3 минуты при первом запуске)';
      setTimeout(() => pollStatus(), 3000);
      return;
    }

    applyData(d);
    document.getElementById('mapOverlay').style.display = 'none';
  } catch(e) {
    document.getElementById('loadMsg').textContent = 'Ошибка загрузки: ' + e.message;
  }
}

async function pollStatus() {
  try {
    const r = await fetch('/equipment/status');
    const d = await r.json();
    if (d.isReady) {
      document.getElementById('loadMsg').textContent = 'Готово! Загружаем данные…';
      const r2 = await fetch('/equipment/map-data');
      const d2 = await r2.json();
      if (d2.ok && !d2.loading) {
        applyData(d2);
        document.getElementById('mapOverlay').style.display = 'none';
        return;
      }
    }
    if (d.error) { document.getElementById('loadMsg').textContent = 'Ошибка: ' + d.error; return; }
    const count = d.count || 0;
    document.getElementById('loadMsg').textContent = `Загружаем… ${count > 0 ? count + ' приборов' : ''}`;
    setTimeout(pollStatus, 3000);
  } catch(e) {
    setTimeout(pollStatus, 5000);
  }
}

function applyData(d) {
  allItems = d.items;
  manufacturers = d.manufacturers || [];
  deviceNames = d.deviceNames || [];
  cities = d.cities || [];
  companies = d.companies || [];
  updateStats(d.stats);
  buildMfrChips();
  buildModelSelect();
  applyFilters();
}

async function refreshData() { await loadData(true); }

function updateStats(s) {
  document.getElementById('sTotal').textContent = s.total;
  document.getElementById('sMapped').textContent = s.mapped;
  document.getElementById('sWarr').textContent = s.warranty;
  document.getElementById('sProb').textContent = s.problems;
}

// ── Filter builders ───────────────────────────────────────────────────────────
function buildMfrChips() {
  const sel = document.getElementById('mfrSel');
  if (!sel) return;
  sel.innerHTML = '<option value="">Все производители</option>';
  for (const m of manufacturers) {
    sel.innerHTML += `<option value="${m.id}" ${curMfr===m.id?'selected':''}>${esc(m.name)} (${m.count})</option>`;
  }
}

function buildModelSelect() {
  const sel = document.getElementById('modelSel');
  // Filter to current manufacturer
  const filtered = curMfr
    ? deviceNames.filter(d => {
        const items = allItems.filter(i => i.manufacturerIds.includes(curMfr));
        return items.some(i => i.deviceNameIds.includes(d.id));
      })
    : deviceNames;
  sel.innerHTML = '<option value="">Все модели</option>';
  for (const d of filtered) {
    sel.innerHTML += `<option value="${d.id}" ${curModel===d.id?'selected':''}>${esc(d.name)} (${d.count})</option>`;
  }
}

// ── Filter state setters ──────────────────────────────────────────────────────
function setMfr(id) {
  curMfr = id; curModel = '';
  document.getElementById('modelSel').value = '';
  buildModelSelect();
  applyFilters();
}

function setMfrFromSel() {
  setMfr(document.getElementById('mfrSel').value);
}

function setStat(v) {
  curStatus = v;
  applyFilters();
}

function setStatFromSel() {
  setStat(document.getElementById('statusSel').value);
}

function setMode(m, el) {
  mode = m;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('modeEquipment').style.display = m==='equipment'?'':'none';
  document.getElementById('modeCity').style.display = m==='city'?'':'none';
  document.getElementById('modeCompany').style.display = m==='company'?'':'none';
  curCity = ''; curCompany = '';
  document.getElementById('cityInput').value = '';
  document.getElementById('companyInput').value = '';
  applyFilters();
}

// ── Autocomplete ──────────────────────────────────────────────────────────────
function onCityInput() {
  clearTimeout(debT);
  debT = setTimeout(() => {
    const q = document.getElementById('cityInput').value.trim().toLowerCase();
    const ac = document.getElementById('cityAC');
    if (q.length < 1) { ac.classList.remove('show'); curCity=''; applyFilters(); return; }
    const matches = cities.filter(c => c.name.toLowerCase().includes(q)).slice(0, 12);
    ac.innerHTML = matches.map(c => `<div class="ac-item" onclick="selectCity('${esc(c.name)}')">${esc(c.name)}<span class="ac-cnt">${c.count} шт.</span></div>`).join('');
    ac.classList.toggle('show', matches.length > 0);
  }, 200);
}

function selectCity(name) {
  document.getElementById('cityInput').value = name;
  document.getElementById('cityAC').classList.remove('show');
  curCity = name;
  applyFilters();
  // Fly to first item with coords in this city
  const item = filteredItems.find(i => i.lat && i.lng);
  if (item) map.flyTo([item.lat, item.lng], 10, { duration: 1 });
}

function onCompanyInput() {
  clearTimeout(debT);
  debT = setTimeout(() => {
    const q = document.getElementById('companyInput').value.trim().toLowerCase();
    const ac = document.getElementById('companyAC');
    if (q.length < 2) { ac.classList.remove('show'); curCompany=''; applyFilters(); return; }
    const matches = companies.filter(c => c.name.toLowerCase().includes(q)).slice(0, 12);
    ac.innerHTML = matches.map(c => `<div class="ac-item" onclick="selectCompany('${c.id}','${esc(c.name)}')">${esc(c.name)}</div>`).join('');
    ac.classList.toggle('show', matches.length > 0);
  }, 200);
}

function selectCompany(id, name) {
  document.getElementById('companyInput').value = name;
  document.getElementById('companyAC').classList.remove('show');
  curCompany = id;
  applyFilters();
  const item = filteredItems.find(i => i.lat && i.lng);
  if (item) map.flyTo([item.lat, item.lng], 11, { duration: 1 });
}

// ── Main filter ───────────────────────────────────────────────────────────────
function applyFilters() {
  // Read current model from select
  curModel = document.getElementById('modelSel')?.value || '';

  filteredItems = allItems.filter(item => {
    if (curMfr && !item.manufacturerIds.includes(curMfr)) return false;
    if (curModel && !item.deviceNameIds.includes(curModel)) return false;
    if (curStatus === 'prolab' && item.seller !== 'ProLabSupport') return false;
    if (curStatus === 'third' && item.seller !== 'Сторонний продавец') return false;
    if (curStatus === 'warranty') {
      if (item.hasWarranty !== 'Есть') return false;
      if (!item.warrantyEnd || new Date(item.warrantyEnd) < new Date()) return false;
    }
    if (curStatus === 'problems' && !item.hasProblems) return false;
    if (curCity && item.city?.toLowerCase() !== curCity.toLowerCase()) return false;
    if (curCompany && String(item.companyId) !== curCompany) return false;
    return true;
  });

  if (mode === 'equipment' || mode === 'city' || mode === 'company') {
    document.getElementById('modelSel').value = curModel;
    renderList();
    renderMarkers();
  }
}

// ── Render list ───────────────────────────────────────────────────────────────
function renderList() {
  const wrap = document.getElementById('eqList');
  if (!filteredItems.length) {
    wrap.innerHTML = `<div class="eq-empty">Ничего не найдено</div>`; return;
  }
  wrap.innerHTML = filteredItems.map(item => {
    const wOk = item.hasWarranty === 'Есть' && item.warrantyEnd && new Date(item.warrantyEnd) > new Date();
    const wExp = wOk && (new Date(item.warrantyEnd) - new Date()) < 90*24*60*60*1000;
    let tags = '';
    if (item.hasProblems) tags += `<span class="tag danger">⚠ Активные заявки</span>`;
    if (wOk) tags += `<span class="tag ${wExp?'warn':'success'}">Гарантия до ${fmtDate(item.warrantyEnd)}</span>`;
    if (!item.lat && !item.lng) tags += `<span class="tag">📍 Без координат</span>`;
    return `<div class="eq-item ${item.hasProblems?'prob':''} ${selectedId===item.id?'on':''}" id="eq-${item.id}" onclick="selectItem(${item.id})">
      <div class="eq-row">
        <div class="eq-icon ${item.seller==='ProLabSupport'?'pl':'th'}">${item.seller==='ProLabSupport'?'🔵':'⚪'}</div>
        <div class="eq-name">${esc(item.title)}</div>
      </div>
      <div class="eq-meta">
        ${item.companyName?`<span style="font-weight:600;color:var(--text-2)">${esc(item.companyName)}</span>`:''}
        ${item.city?`<span>${esc(item.city)}</span>`:''}
        ${tags}
      </div>
    </div>`;
  }).join('');
}

// ── Render map markers ────────────────────────────────────────────────────────
function renderMarkers() {
  clusterGroup.clearLayers();
  markers = {};
  for (const item of filteredItems) {
    if (!item.lat || !item.lng) continue;
    const m = L.marker([item.lat, item.lng], { icon: makeIcon(item), hasProblems: item.hasProblems });
    m.on('click', () => selectItem(item.id));
    m.bindTooltip(`<strong>${esc(item.title)}</strong><br>${esc(item.companyName||'')}${item.city?'<br>'+esc(item.city):''}`, { direction:'top', offset:[0,-6] });
    clusterGroup.addLayer(m);
    markers[item.id] = m;
  }
}

// ── Tickets layer ─────────────────────────────────────────────────────────────
function toggleTicketsLayer() {
  showTickets = !showTickets;
  const btn = document.getElementById('btnTickets');
  btn.classList.toggle('on', showTickets);
  if (showTickets) {
    map.removeLayer(clusterGroup);
    renderTicketsLayer();
    map.addLayer(ticketLayer);
  } else {
    ticketLayer.clearLayers();
    map.removeLayer(ticketLayer);
    map.addLayer(clusterGroup);
  }
}

function renderTicketsLayer() {
  ticketLayer.clearLayers();

  // Check data is loaded
  if (!allItems.length) {
    alert('Данные ещё загружаются, подождите немного и попробуйте снова');
    showTickets = false;
    document.getElementById('btnTickets').classList.remove('on');
    map.addLayer(clusterGroup);
    return;
  }

  const ticketsByCity = {};

  for (const item of allItems) {
    if (!item.activeTickets?.length) continue;

    // Need coordinates — from item directly
    const lat = item.lat;
    const lng = item.lng;
    if (!lat || !lng) continue;

    const key = item.city || `${lat.toFixed(3)},${lng.toFixed(3)}`;
    if (!ticketsByCity[key]) {
      ticketsByCity[key] = { lat, lng, tickets: [], city: item.city };
    }
    ticketsByCity[key].tickets.push(...item.activeTickets);
  }

  const locs = Object.values(ticketsByCity);

  if (!locs.length) {
    // No tickets with coordinates found — show info
    const totalTickets = allItems.reduce((s, i) => s + (i.activeTickets?.length||0), 0);
    const msg = totalTickets > 0
      ? `Найдено ${totalTickets} активных заявок, но у связанного оборудования нет координат на карте. Сначала дождитесь завершения геокодирования.`
      : 'Активных заявок не найдено';
    alert(msg);
    showTickets = false;
    document.getElementById('btnTickets').classList.remove('on');
    map.addLayer(clusterGroup);
    return;
  }

  for (const loc of locs) {
    const hasOv = loc.tickets.some(t => t.isOverdue);
    const color = hasOv ? '#c4314b' : '#FF6B35';
    const cnt = loc.tickets.length;

    const icon = L.divIcon({
      html: `<div style="background:${color};color:#fff;border-radius:10px;padding:5px 11px;font-size:12px;font-weight:700;box-shadow:0 3px 10px rgba(0,0,0,.3);border:2px solid #fff;white-space:nowrap">🔔 ${cnt}</div>`,
      className: '', iconAnchor: [30, 16],
    });

    const byStage = {};
    for (const t of loc.tickets) byStage[t.stageId] = (byStage[t.stageId]||0)+1;

    const stageRows = Object.entries(byStage).map(([s, c]) => {
      const clr = s.includes(':1') ? '#FF6B35' : (s.includes('NEW') || s.includes('UC_N8')) ? '#22B9FF' : '#605e5c';
      return `<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #f0f0f0">
        <span style="color:${clr};font-weight:600;font-size:11px">${esc(STAGE_NAMES[s]||s)}</span>
        <span style="font-weight:700">${c}</span>
      </div>`;
    }).join('');

    const popup = L.popup({ maxWidth: 280 }).setContent(
      `<div style="font-family:Inter,sans-serif;font-size:12px;min-width:200px">
        <div style="font-weight:700;font-size:13px;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid #f0f0f0">
          📍 ${esc(loc.city||'Локация')}
        </div>
        <div style="margin-bottom:8px;color:#605e5c">
          Активных заявок: <strong style="color:#201f1e">${cnt}</strong>
          ${hasOv ? ' <span style="color:#c4314b">⚠ есть просроченные</span>' : ''}
        </div>
        <div>${stageRows}</div>
      </div>`
    );
    L.marker([loc.lat, loc.lng], { icon }).bindPopup(popup).addTo(ticketLayer);
  }

  // Fit map to ticket markers
  if (locs.length > 0) {
    const bounds = L.latLngBounds(locs.map(l => [l.lat, l.lng]));
    map.fitBounds(bounds, { padding: [40, 40] });
  }
}

// ── Select item ────────────────────────────────────────────────────────────────
function selectItem(id) {
  selectedId = id;
  const item = allItems.find(e => e.id === id);
  if (!item) return;
  document.querySelectorAll('.eq-item').forEach(el => el.classList.remove('on'));
  document.getElementById('eq-' + id)?.classList.add('on');
  document.getElementById('eq-' + id)?.scrollIntoView({ block:'nearest', behavior:'smooth' });
  if (item.lat && item.lng) {
    map.flyTo([item.lat, item.lng], 14, { duration: 0.8 });
    markers[id]?.openTooltip();
  }
  showDetail(item);
}

function showDetail(item) {
  const wOk = item.hasWarranty === 'Есть' && item.warrantyEnd && new Date(item.warrantyEnd) > new Date();
  const wColor = wOk ? 'var(--success)' : 'var(--danger)';
  const wText = item.hasWarranty === 'Есть' ? `Есть (до ${fmtDate(item.warrantyEnd)})` : item.hasWarranty === 'Нет' ? 'Нет' : '—';
  let tickets = '';
  if (item.activeTickets?.length) {
    tickets = `<div class="dp-sec">Активные заявки (${item.activeTickets.length})</div>`;
    for (const t of item.activeTickets) {
      tickets += `<div class="dp-ticket ${t.isOverdue?'ov':''}">
        <div class="dp-ticket-t">#${t.id} ${esc((t.title||'').replace(/^[-\s–—]+/,'').slice(0,55))}</div>
        <div class="dp-ticket-s">${esc(STAGE_NAMES[t.stageId]||t.stageId)}${t.isOverdue?' ⚠ Просрочена':''}</div>
        <a href="${t.url}" target="_blank" style="font-size:11px;color:var(--brand)">Открыть →</a>
      </div>`;
    }
  }
  document.getElementById('dpTitle').textContent = item.title;
  document.getElementById('dpBody').innerHTML = `
    ${item.companyName?`<div class="dp-row"><div class="dp-lbl">Клиент</div><div class="dp-val" style="font-weight:600">${esc(item.companyName)}</div></div>`:''}
    <div class="dp-row"><div class="dp-lbl">Адрес</div><div class="dp-val">${esc(item.address||'—')}</div></div>
    <div class="dp-row"><div class="dp-lbl">Производитель</div><div class="dp-val">${esc(item.manufacturer||'—')}</div></div>
    <div class="dp-row"><div class="dp-lbl">Вид</div><div class="dp-val">${esc(item.deviceType||'—')}</div></div>
    ${item.catalogNums?.length?`<div class="dp-row"><div class="dp-lbl">Каталог №</div><div class="dp-val">${item.catalogNums.map(esc).join(', ')}</div></div>`:''}
    ${item.serialNums?.length?`<div class="dp-row"><div class="dp-lbl">Серийный №</div><div class="dp-val">${item.serialNums.map(esc).join(', ')}</div></div>`:''}
    <div class="dp-row"><div class="dp-lbl">Гарантия</div><div class="dp-val" style="color:${wColor};font-weight:600">${wText}</div></div>
    <div class="dp-row"><div class="dp-lbl">Продавец</div><div class="dp-val">${esc(item.seller||'—')}</div></div>
    ${item.serviceStart?`<div class="dp-row"><div class="dp-lbl">Обслуживание</div><div class="dp-val">${fmtDate(item.serviceStart)} - ${item.serviceEnd?fmtDate(item.serviceEnd):'∞'}</div></div>`:''}
    ${tickets}
    <a href="${item.url}" target="_blank" class="dp-btn">Открыть в Б24 →</a>`;
  document.getElementById('dp').classList.add('show');
}

function closeDP() {
  document.getElementById('dp').classList.remove('show');
  selectedId = null;
  document.querySelectorAll('.eq-item').forEach(el => el.classList.remove('on'));
}

document.addEventListener('click', e => {
  if (!e.target.closest('.sinput')) {
    document.getElementById('cityAC')?.classList.remove('show');
    document.getElementById('companyAC')?.classList.remove('show');
  }
});

function fmtDate(d) { return d ? new Date(d).toLocaleDateString('ru', { day:'2-digit', month:'2-digit', year:'numeric' }) : '—'; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

init();
</script>
</body>
</html>
